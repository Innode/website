<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <meta
      name="description"
      content="Innode does product development and consulting."
    />
    <title>Innode</title>
    <link rel="icon" type="image/png" href="./assets/INNODE.png" />
    <link rel="apple-touch-icon" href="./assets/INNODE.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="/" aria-label="Innode home">
          <img src="./assets/INNODE-wordmark.png" alt="Innode logo" />
        </a>
      </header>

      <main class="intro">
        <section class="service">
          <p class="service__title">Product development</p>
          <p class="copy">
            Building secure, local-first communication systems for a more
            private web.
          </p>

          <section class="link-groups" aria-label="Product development links">
            <nav class="link-group" aria-label="References">
              <span class="link-group__label">references:</span>
              <span class="links">
                <span class="link-item">
                  <a href="https://search.fipstr.com" target="_blank" rel="noreferrer">fipstr</a>
                </span>
                <span class="link-item">
                  <a href="https://github.com/Innode" target="_blank" rel="noreferrer">github</a>
                </span>
              </span>
            </nav>
          </section>
        </section>

        <section class="service">
          <p class="service__title">Consulting</p>
          <p class="copy">
            Consulting on full-stack software development, product direction,
            and practical AI adoption.
          </p>

          <section class="link-groups" aria-label="Consulting links">
            <nav class="link-group" aria-label="Public references">
              <span class="link-group__label">public references:</span>
              <span class="links">
                <span class="link-item">
                  <a href="https://iris.to" target="_blank" rel="noreferrer">iris.to</a>
                </span>
                <span class="link-item">
                  <a href="https://herizon.io" target="_blank" rel="noreferrer">herizon.io</a>
                </span>
              </span>
            </nav>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
